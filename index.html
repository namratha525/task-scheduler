<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Priority Task Scheduler</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --green: #10b981;
    --yellow: #f59e0b;
    --red: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 2rem;
  }

  body::before {
    content: '';
    position: fixed;
    top: -30%;
    left: -10%;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(124,58,237,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: -20%;
    right: -10%;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(6,182,212,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper { max-width: 900px; margin: 0 auto; position: relative; z-index: 1; }

  header {
    margin-bottom: 2.5rem;
    animation: fadeUp 0.6s ease both;
  }

  header h1 {
    font-size: 2.4rem;
    font-weight: 800;
    background: linear-gradient(135deg, #a78bfa, #06b6d4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.02em;
  }

  header p {
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    margin-top: 0.3rem;
    letter-spacing: 0.05em;
  }

  .badge {
    display: inline-block;
    background: rgba(124,58,237,0.15);
    border: 1px solid rgba(124,58,237,0.3);
    color: #a78bfa;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    padding: 0.2rem 0.6rem;
    border-radius: 4px;
    margin-top: 0.6rem;
    letter-spacing: 0.08em;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    animation: fadeUp 0.6s ease both;
  }

  .card:nth-child(2) { animation-delay: 0.1s; }
  .card:nth-child(3) { animation-delay: 0.2s; }

  .card-title {
    font-size: 0.7rem;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 1.2rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .card-title::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
  }

  .input-grid {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr auto;
    gap: 0.6rem;
    align-items: end;
  }

  .field label {
    display: block;
    font-size: 0.68rem;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
    margin-bottom: 0.4rem;
    letter-spacing: 0.06em;
  }

  .field input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.55rem 0.8rem;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus { border-color: var(--accent); }

  .btn {
    padding: 0.55rem 1.2rem;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-add {
    background: var(--accent);
    color: white;
  }

  .btn-add:hover { background: #6d28d9; transform: translateY(-1px); }

  .btn-run {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    padding: 0.7rem 2rem;
    font-size: 0.9rem;
  }

  .btn-run:hover { opacity: 0.9; transform: translateY(-1px); }

  .btn-clear {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .btn-clear:hover { border-color: var(--red); color: var(--red); }

  .task-list {
    margin-top: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .task-row {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr auto;
    gap: 0.6rem;
    align-items: center;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 0.8rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    animation: fadeUp 0.3s ease both;
  }

  .task-name { color: var(--accent2); font-weight: 600; }
  .task-val { color: var(--text); }
  .priority-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 6px;
  }

  .remove-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    transition: color 0.2s;
    padding: 0 0.3rem;
  }
  .remove-btn:hover { color: var(--red); }

  .controls {
    display: flex;
    gap: 0.8rem;
    margin-top: 1.2rem;
    justify-content: flex-end;
  }

  .gantt-wrap { overflow-x: auto; margin-top: 0.5rem; }

  .gantt-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.6rem;
    min-width: 600px;
  }

  .gantt-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    width: 80px;
    flex-shrink: 0;
    text-align: right;
  }

  .gantt-bar {
    height: 32px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    font-weight: 600;
    color: white;
    position: relative;
    min-width: 40px;
    transition: all 0.3s;
    animation: barGrow 0.5s ease both;
  }

  @keyframes barGrow {
    from { transform: scaleX(0); opacity: 0; transform-origin: left; }
    to { transform: scaleX(1); opacity: 1; }
  }

  .gantt-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    margin-left: 0.3rem;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    margin-top: 0.5rem;
  }

  th {
    text-align: left;
    color: var(--muted);
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.5rem 0.8rem;
    border-bottom: 1px solid var(--border);
  }

  td {
    padding: 0.6rem 0.8rem;
    border-bottom: 1px solid rgba(30,30,46,0.5);
    color: var(--text);
  }

  tr:last-child td { border-bottom: none; }
  tr { animation: fadeUp 0.3s ease both; }

  .highlight { color: var(--accent2); font-weight: 600; }
  .good { color: var(--green); }
  .warn { color: var(--yellow); }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin-top: 1rem;
  }

  .stat-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem;
    text-align: center;
    animation: fadeUp 0.5s ease both;
  }

  .stat-val {
    font-size: 1.8rem;
    font-weight: 800;
    background: linear-gradient(135deg, #a78bfa, #06b6d4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 0.3rem;
  }

  .empty {
    text-align: center;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    padding: 2rem;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 640px) {
    .input-grid { grid-template-columns: 1fr 1fr; }
    .btn-add { grid-column: span 2; }
    .task-row { grid-template-columns: 1fr 1fr 1fr; font-size: 0.72rem; }
    .stats-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <h1>Priority Task Scheduler</h1>
    <p>// Max-Heap based CPU scheduling simulation</p>
    <span class="badge">O(log n) · C++ DSA → Web Visualizer</span>
  </header>

  <div class="card">
    <div class="card-title">Add Task</div>
    <div class="input-grid">
      <div class="field">
        <label>TASK NAME</label>
        <input id="tname" type="text" placeholder="e.g. Process_A"/>
      </div>
      <div class="field">
        <label>PRIORITY</label>
        <input id="tpriority" type="number" placeholder="1–10" min="1" max="10"/>
      </div>
      <div class="field">
        <label>ARRIVAL (ms)</label>
        <input id="tarrival" type="number" placeholder="0" min="0"/>
      </div>
      <div class="field">
        <label>BURST (ms)</label>
        <input id="tburst" type="number" placeholder="5" min="1"/>
      </div>
      <button class="btn btn-add" onclick="addTask()">+ Add</button>
    </div>

    <div class="task-list" id="taskList">
      <div class="empty" id="emptyMsg">No tasks added yet. Add tasks above ↑</div>
    </div>

    <div class="controls">
      <button class="btn btn-clear" onclick="clearAll()">Clear All</button>
      <button class="btn btn-run" onclick="runScheduler()">▶ Run Scheduler</button>
    </div>
  </div>

  <div class="card" id="resultsCard" style="display:none;">
    <div class="card-title">Gantt Chart</div>
    <div class="gantt-wrap" id="ganttChart"></div>

    <div class="card-title" style="margin-top:1.5rem;">Execution Results</div>
    <table>
      <thead>
        <tr>
          <th>Task</th>
          <th>Priority</th>
          <th>Arrival</th>
          <th>Burst</th>
          <th>Start</th>
          <th>Finish</th>
          <th>Waiting</th>
          <th>Turnaround</th>
        </tr>
      </thead>
      <tbody id="resultsBody"></tbody>
    </table>

    <div class="stats-row" id="statsRow"></div>
  </div>
</div>

<script>
  let tasks = [];
  const COLORS = ['#7c3aed','#06b6d4','#10b981','#f59e0b','#ef4444','#ec4899','#8b5cf6','#14b8a6','#f97316','#3b82f6'];

  function addTask() {
    const name = document.getElementById('tname').value.trim() || `Task_${tasks.length + 1}`;
    const priority = parseInt(document.getElementById('tpriority').value) || 5;
    const arrival = parseInt(document.getElementById('tarrival').value) || 0;
    const burst = parseInt(document.getElementById('tburst').value) || 5;
    tasks.push({ name, priority: Math.min(10, Math.max(1, priority)), arrival, burst, id: Date.now() });
    renderTaskList();
    clearInputs();
  }

  function clearInputs() {
    ['tname','tpriority','tarrival','tburst'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('tname').focus();
  }

  function removeTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    renderTaskList();
  }

  function clearAll() {
    tasks = [];
    renderTaskList();
    document.getElementById('resultsCard').style.display = 'none';
  }

  function getPriorityColor(p) {
    if (p >= 8) return '#ef4444';
    if (p >= 5) return '#f59e0b';
    return '#10b981';
  }

  function renderTaskList() {
    const list = document.getElementById('taskList');
    if (tasks.length === 0) {
      list.innerHTML = '<div class="empty">No tasks added yet. Add tasks above ↑</div>';
      return;
    }
    list.innerHTML = tasks.map(t => `
      <div class="task-row">
        <span class="task-name">⬡ ${t.name}</span>
        <span class="task-val"><span class="priority-dot" style="background:${getPriorityColor(t.priority)}"></span>P${t.priority}</span>
        <span class="task-val">${t.arrival}ms</span>
        <span class="task-val">${t.burst}ms</span>
        <button class="remove-btn" onclick="removeTask(${t.id})">✕</button>
      </div>
    `).join('');
  }

  function runScheduler() {
    if (tasks.length === 0) { alert('Add at least one task!'); return; }
    let ready = [];
    let time = 0;
    let completed = [];
    let remaining = tasks.map(t => ({ ...t })).sort((a, b) => a.arrival - b.arrival);

    while (remaining.length > 0 || ready.length > 0) {
      remaining = remaining.filter(t => {
        if (t.arrival <= time) { ready.push(t); return false; }
        return true;
      });
      if (ready.length === 0) { time = remaining[0].arrival; continue; }
      ready.sort((a, b) => b.priority - a.priority || a.arrival - b.arrival);
      const current = ready.shift();
      const start = time;
      const finish = time + current.burst;
      completed.push({ ...current, start, finish, waiting: start - current.arrival, turnaround: finish - current.arrival });
      time = finish;
      remaining = remaining.filter(t => {
        if (t.arrival <= time) { ready.push(t); return false; }
        return true;
      });
    }
    renderResults(completed);
  }

  function renderResults(results) {
    const card = document.getElementById('resultsCard');
    card.style.display = 'block';
    card.scrollIntoView({ behavior: 'smooth', block: 'start' });

    const maxTime = Math.max(...results.map(r => r.finish));
    document.getElementById('ganttChart').innerHTML = results.map((r, i) => `
      <div class="gantt-row">
        <div class="gantt-label">${r.name}</div>
        <div style="flex:1;display:flex;align-items:center;gap:4px;">
          <div style="width:${(r.start/maxTime*100).toFixed(1)}%;min-width:0;"></div>
          <div class="gantt-bar" style="width:${(r.burst/maxTime*100).toFixed(1)}%;background:${COLORS[i%COLORS.length]};animation-delay:${i*0.08}s;">
            ${r.burst}ms
          </div>
          <span class="gantt-time">${r.start}→${r.finish}ms</span>
        </div>
      </div>
    `).join('');

    document.getElementById('resultsBody').innerHTML = results.map((r, i) => `
      <tr style="animation-delay:${i*0.05}s">
        <td class="highlight">${r.name}</td>
        <td><span style="color:${getPriorityColor(r.priority)}">P${r.priority}</span></td>
        <td>${r.arrival}ms</td>
        <td>${r.burst}ms</td>
        <td>${r.start}ms</td>
        <td>${r.finish}ms</td>
        <td class="${r.waiting<=5?'good':r.waiting<=15?'warn':''}">${r.waiting}ms</td>
        <td>${r.turnaround}ms</td>
      </tr>
    `).join('');

    const avgWait = (results.reduce((s,r) => s+r.waiting, 0)/results.length).toFixed(2);
    const avgTA = (results.reduce((s,r) => s+r.turnaround, 0)/results.length).toFixed(2);
    document.getElementById('statsRow').innerHTML = `
      <div class="stat-box"><div class="stat-val">${avgWait}ms</div><div class="stat-label">Avg Waiting Time</div></div>
      <div class="stat-box"><div class="stat-val">${avgTA}ms</div><div class="stat-label">Avg Turnaround Time</div></div>
      <div class="stat-box"><div class="stat-val">${maxTime}ms</div><div class="stat-label">Total CPU Time</div></div>
    `;
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.activeElement.tagName === 'INPUT') addTask();
  });

  tasks = [
    { name: 'Process_A', priority: 8, arrival: 0, burst: 6, id: 1 },
    { name: 'Process_B', priority: 3, arrival: 2, burst: 4, id: 2 },
    { name: 'Process_C', priority: 10, arrival: 3, burst: 5, id: 3 },
  ];
  renderTaskList();
</script>
</body>
</html>
